# ScholarGym Experiment Manifest
#
# This is the main entrypoint for managed experiments.
# Edit `defaults` first, then add or copy entries under `experiments`.
#
# Most experiments only need these fields:
#   - name          unique run id; also becomes runs/<name>/
#   - model         model name passed to eval.py
#   - is_local      true for local serving backends; false for remote APIs
#   - group         second-level grouping in monitors, usually the model family
#   - type          top-level grouping in monitors, e.g. main / ablation / debug
#   - browser_mode  NONE / PRE_ENRICH / REFRESH / INCREMENTAL
#
# Common commands:
#   python scripts/exp/launcher.py up                  # launch all
#   python scripts/exp/launcher.py up --only name1     # launch one
#   python scripts/exp/launcher.py down                # stop all running
#   python scripts/exp/launcher.py status              # one-shot status
#   python scripts/exp/dashboard.py                    # quick live monitor
#   python scripts/exp/tui.py                          # interactive monitor
#
# Notes:
#   - Anything in `defaults` can be overridden per experiment.
#   - `env` is optional and is passed only to that experiment process.
#   - Existing runs resume from their checkpoint and keep their existing runs/<name>/config.py.
#   - Legacy checked-in presets from `code/configs/` have been folded into the
#     commented examples below; copy one and adjust it instead of creating a new
#     Python config module.

runs_dir: runs

defaults:
  # Usually change this first.
  benchmark_jsonl: data/test_fast.jsonl

  # Common evaluation settings.
  workflow: deep_research
  search_method: bm25
  max_iterations: 5
  results_per_query: 10
  prompt_type: complex

  # Usually keep these defaults unless doing an ablation.
  enable_reasoning: true
  enable_structured_output: false
  browser_mode: NONE

experiments:
  # Local model example.
  - name: qwen3-8b-none
    model: qwen3-8b
    is_local: true
    group: qwen3-8b
    type: main
    browser_mode: NONE

  # Same model, different browser mode.
  - name: qwen3-8b-refresh
    model: qwen3-8b
    is_local: true
    group: qwen3-8b
    type: main
    browser_mode: REFRESH

  # Remote API example with per-experiment env overrides.
  - name: gpt54-none
    model: gpt-5.4
    is_local: false
    group: gpt-5.4
    type: main
    browser_mode: NONE
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: https://your-openai-compatible-endpoint/v1

  - name: glm51-none
    model: glm-5.1
    is_local: false
    group: glm-5.1
    type: main
    browser_mode: NONE

