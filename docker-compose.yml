services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6433:6333"   # REST API
      - "6434:6334"   # gRPC
    volumes:
      # Qdrant requires a local filesystem (ext4/xfs), not NFS.
      # Change this path if your storage location differs.
      - /share/qdrant_db:/qdrant/storage
    restart: unless-stopped
